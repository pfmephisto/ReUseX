name: Claude Code Review

on:
  pull_request:
    types: [labeled]

jobs:
  claude-review:
    # Only run when the "needs-review" label is added
    if: github.event.label.name == 'needs-review'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(git log:*),Bash(git blame:*),Bash(git diff:*)"
          prompt: |
            Review the PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            Perform a thorough code review focusing on:

            1. **Correctness** - Logic errors, edge cases, potential bugs
            2. **Code Quality** - Readability, maintainability, adherence to project conventions
            3. **Security** - Vulnerabilities, input validation, resource handling
            4. **Performance** - Inefficiencies, unnecessary allocations, algorithmic concerns

            Use inline comments for specific issues on individual lines/hunks.
            Use a top-level PR comment for a summary of the review.

            This is a C++20/CUDA project. Follow the conventions in CLAUDE.md.

      - name: Update labels after review
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Remove the "needs-review" label
          gh pr edit ${{ github.event.pull_request.number }} --remove-label "needs-review"

          # Add the "reviewed" label
          gh pr edit ${{ github.event.pull_request.number }} --add-label "reviewed"
